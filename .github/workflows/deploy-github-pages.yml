# Deploy this Vite app to GitHub Pages (user site: insidershiv.github.io).
# Repo must be named: insidershiv.github.io
# Settings → Pages → Build: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # npm install (not npm ci): tolerates small lockfile drift; avoids flaky CI when package.json/lock differ slightly on the remote
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - run: npm run build
      - name: SPA fallback (404 → index for client routes)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
